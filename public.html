<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laboratorijas pārskats</title>
<h2>Laboratorijas datubāze</h2>
<p>Šeit vari apskatīt laboratorijas inventāru un vielas.</p>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page database-page">
    <a class="back-link" href="index.html">← Atpakaļ uz sākumlapu</a>

    <div class="content-block db-header">
      <h2>Inventāra sistēma</h2>
      <p>Šajā datubāzē Tu vari apskatīt pieejamās vielas un aprīkojumu.</p>

      <div class="toolbar">
        <button type="button" class="btn btn-outline small" id="showAllBtn">
          Rādīt visu
        </button>
        <button type="button" class="btn btn-outline small" id="showVielasBtn">
          Rādīt vielas
        </button>
        <button type="button" class="btn btn-outline small" id="showInventarsBtn">
          Rādīt aprīkojumu
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nosaukums</th>
            <th>Tips</th>
            <th>Apakštips</th>
            <th>Skaits</th>
            <th>Daudzums</th>
            <th>Komentāri</th>
          </tr>
        </thead>
        <tbody id="dataTableBody"></tbody>
      </table>
    </div>

    <a class="bug-btn" href="#">Ziņot par kļūdu</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
