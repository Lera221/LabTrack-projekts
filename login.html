<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabTrack - Pieslēgties</title>
<h1>Esi sveicināts<br><span>LabTrack</span></h1>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page split-page">
    <div class="left-panel brand-panel">
      <div class="brand-content">
        <h1>Esi sveicināts<br><span>KLUS</span></h1>
        <div class="brand-line"></div>
        <p>Tavas laboratorijas uzskaites sistēma</p>
      </div>
      <div class="lab-illustration" aria-hidden="true">
        <div class="blob"></div>
        <div class="tube tube-left"></div>
        <div class="tube tube-center"></div>
        <div class="scientist"></div>
      </div>
    </div>

    <div class="right-panel login-panel">
      <a class="back-link" href="index.html">&#8592; Atpakaļ uz sākumlapu</a>

      <div class="content-block login-block">
        <h2>Pieslēgties</h2>
        <p>Ķīmijas laboratorijas uzskaites sistēmai</p>

        <form class="login-form">
          <label for="email">Lietotājvārds</label>
          <input id="email" type="text" placeholder="Ievadi lietotājvārdu" />

          <label for="password">Parole</label>
          <input id="password" type="password" placeholder="Ievadi paroli" />

          <button type="button" class="btn btn-primary form-btn">Pieslēgties</button>
        </form>

        <div class="divider"></div>
        <p class="register-line">Neesi vēl reģistrējies? <a href="#">Izveidot profilu</a></p>
      </div>

      <a class="bug-btn" href="#">Ziņot par kļūdu</a>
    </div>
  </div>
</body>
</html>
